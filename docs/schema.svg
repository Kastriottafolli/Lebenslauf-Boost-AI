<svg width="1500" height="1500" viewBox="0 0 1500 1500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#262b40" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1500" height="1500" fill="#eef3fa"/>

  <!-- ═══ Titel ═══ -->
  <text x="60" y="56" fill="#262b40" font-size="27" font-weight="700">Datenbankschema — Lebenslauf Boost AI</text>
  <text x="60" y="82" fill="#5379ae" font-size="13.5">SQLite &#183; SQLAlchemy ORM &#183; 4 Tabellen &#183; Quelle: backend/models.py &#183; Doku: docs/DATABASE.md</text>

  <!-- ═══ Legende ═══ -->
  <g font-size="11.5" fill="#5379ae">
    <circle cx="66" cy="112" r="4.5" fill="#0474c4"/><text x="76" y="116">Prim&#228;rschl&#252;ssel (PK)</text>
    <circle cx="220" cy="112" r="4.5" fill="#2563EB"/><text x="230" y="116">Fremdschl&#252;ssel (FK)</text>
    <text x="380" y="116" font-weight="600" fill="#262b40">NN</text><text x="404" y="116">= NOT NULL</text>
    <text x="500" y="116" font-weight="600" fill="#262b40">UQ</text><text x="524" y="116">= UNIQUE</text>
    <g stroke="#5379ae" stroke-width="1.4" fill="none">
      <path d="M614 112 H654"/><path d="M646 106 L654 112 L646 118 M646 112 H654" transform="translate(-6,0)"/>
    </g>
    <text x="664" y="116">Kr&#228;henfu&#223; = n-Seite</text>
    <text x="810" y="116" fill="#8ba3c7">Alle FKs: ON DELETE CASCADE &#183; alle FKs indiziert</text>
  </g>

  <!-- ═══ Verbindungen ═══ -->
  <g stroke="#8ba3c7" stroke-width="1.5" fill="none">
    <path d="M460 496 C 700 496, 700 199, 950 199"/>
    <path d="M460 496 C 700 496, 700 471, 950 471"/>
    <path d="M460 496 C 700 496, 700 847, 950 847"/>
    <!-- 1-Seite (Balken) bei sessions -->
    <path d="M472 489 V503"/>
    <!-- 1:1 — Doppelbalken bei cv_documents -->
    <path d="M934 192 V206 M941 192 V206"/>
    <!-- 1:n — Kraehenfuesse bei generations & messages -->
    <path d="M950 471 L938 464 M950 471 L938 471 M950 471 L938 478"/>
    <path d="M950 847 L938 840 M950 847 L938 847 M950 847 L938 854"/>
  </g>
  <g font-size="11" font-weight="600" text-anchor="middle">
    <rect x="648" y="326" width="112" height="22" rx="11" fill="#ffffff" stroke="#c9d6ea"/>
    <text x="704" y="341" fill="#0474c4">1 : 1 &#183; UNIQUE</text>
    <rect x="666" y="452" width="76" height="22" rx="11" fill="#ffffff" stroke="#c9d6ea"/>
    <text x="704" y="467" fill="#5379ae">1 : n</text>
    <rect x="666" y="668" width="76" height="22" rx="11" fill="#ffffff" stroke="#c9d6ea"/>
    <text x="704" y="683" fill="#2c444c">1 : n</text>
  </g>

  <!-- ═══ sessions ═══ -->
  <g filter="url(#sh)">
    <rect x="60" y="443" width="400" height="185" rx="10" fill="#ffffff" stroke="#d5deee"/>
    <path d="M60 453 Q60 443 70 443 H450 Q460 443 460 453 V483 H60 Z" fill="#06457f"/>
    <text x="78" y="469" fill="#ffffff" font-size="15" font-weight="700">sessions</text>
    <text x="444" y="468" fill="#a8c4ec" font-size="11" text-anchor="end">Nutzersitzung &#183; zentraler Hub</text>
    <line x1="60" y1="509" x2="460" y2="509" stroke="#e2eaf6"/>
    <line x1="60" y1="535" x2="460" y2="535" stroke="#e2eaf6"/>
    <line x1="60" y1="561" x2="460" y2="561" stroke="#e2eaf6"/>
    <line x1="60" y1="587" x2="460" y2="587" stroke="#e2eaf6"/>
    <circle cx="76" cy="496" r="4" fill="#0474c4"/>
    <text x="90" y="500" fill="#262b40" font-size="12.5" font-weight="600">id</text>
    <text x="446" y="500" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(36) &#183; PK &#183; uuid4()</text>
    <text x="90" y="526" fill="#262b40" font-size="12.5">language</text>
    <text x="446" y="526" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(2) &#183; NN &#183; ='de' &#183; CHECK de|en</text>
    <text x="90" y="552" fill="#262b40" font-size="12.5">job_description</text>
    <text x="446" y="552" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NN &#183; ='' &#183; Stellenanzeige</text>
    <text x="90" y="578" fill="#262b40" font-size="12.5">wishes</text>
    <text x="446" y="578" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NN &#183; ='' &#183; W&#252;nsche</text>
    <text x="90" y="604" fill="#262b40" font-size="12.5">created_at</text>
    <text x="446" y="604" fill="#8ba3c7" font-size="10.5" text-anchor="end">DATETIME &#183; NN &#183; utcnow()</text>
  </g>

  <!-- ═══ cv_documents ═══ -->
  <g filter="url(#sh)">
    <rect x="950" y="120" width="490" height="237" rx="10" fill="#ffffff" stroke="#d5deee"/>
    <path d="M950 130 Q950 120 960 120 H1430 Q1440 120 1440 130 V160 H950 Z" fill="#0474c4"/>
    <text x="968" y="146" fill="#ffffff" font-size="15" font-weight="700">cv_documents</text>
    <text x="1424" y="145" fill="#a8c4ec" font-size="11" text-anchor="end">Lebenslauf &#183; RAG-Index &#183; Foto (1:1)</text>
    <line x1="950" y1="186" x2="1440" y2="186" stroke="#e2eaf6"/>
    <line x1="950" y1="212" x2="1440" y2="212" stroke="#e2eaf6"/>
    <line x1="950" y1="238" x2="1440" y2="238" stroke="#e2eaf6"/>
    <line x1="950" y1="264" x2="1440" y2="264" stroke="#e2eaf6"/>
    <line x1="950" y1="290" x2="1440" y2="290" stroke="#e2eaf6"/>
    <line x1="950" y1="316" x2="1440" y2="316" stroke="#e2eaf6"/>
    <circle cx="966" cy="173" r="4" fill="#0474c4"/>
    <text x="980" y="177" fill="#262b40" font-size="12.5" font-weight="600">id</text>
    <text x="1426" y="177" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(36) &#183; PK &#183; uuid4()</text>
    <circle cx="966" cy="199" r="4" fill="#2563EB"/>
    <text x="980" y="203" fill="#262b40" font-size="12.5">session_id</text>
    <text x="1426" y="203" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(36) &#183; NN &#183; UQ &#183; FK &#8594; sessions.id &#183; CASCADE</text>
    <text x="980" y="229" fill="#262b40" font-size="12.5">filename</text>
    <text x="1426" y="229" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(255) &#183; NN &#183; Original-Dateiname</text>
    <text x="980" y="255" fill="#262b40" font-size="12.5">content</text>
    <text x="1426" y="255" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NN &#183; extrahierter Volltext</text>
    <text x="980" y="281" fill="#262b40" font-size="12.5">index_json</text>
    <text x="1426" y="281" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NN &#183; JSON &#8595; Karte A</text>
    <text x="980" y="307" fill="#262b40" font-size="12.5">photo_data_url</text>
    <text x="1426" y="307" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NULL erlaubt &#183; JSON/Base64 &#8595; Karte C</text>
    <text x="980" y="333" fill="#262b40" font-size="12.5">created_at</text>
    <text x="1426" y="333" fill="#8ba3c7" font-size="10.5" text-anchor="end">DATETIME &#183; NN &#183; utcnow()</text>
  </g>

  <!-- ═══ generations ═══ -->
  <g filter="url(#sh)">
    <rect x="950" y="392" width="490" height="341" rx="10" fill="#ffffff" stroke="#d5deee"/>
    <path d="M950 402 Q950 392 960 392 H1430 Q1440 392 1440 402 V432 H950 Z" fill="#5379ae"/>
    <text x="968" y="418" fill="#ffffff" font-size="15" font-weight="700">generations</text>
    <text x="1424" y="417" fill="#c9d6ea" font-size="11" text-anchor="end">KI-Entw&#252;rfe &#183; Bewertung &#183; Historie (1:n)</text>
    <line x1="950" y1="458" x2="1440" y2="458" stroke="#e2eaf6"/>
    <line x1="950" y1="484" x2="1440" y2="484" stroke="#e2eaf6"/>
    <line x1="950" y1="510" x2="1440" y2="510" stroke="#e2eaf6"/>
    <line x1="950" y1="536" x2="1440" y2="536" stroke="#e2eaf6"/>
    <line x1="950" y1="562" x2="1440" y2="562" stroke="#e2eaf6"/>
    <line x1="950" y1="588" x2="1440" y2="588" stroke="#e2eaf6"/>
    <line x1="950" y1="614" x2="1440" y2="614" stroke="#e2eaf6"/>
    <line x1="950" y1="640" x2="1440" y2="640" stroke="#e2eaf6"/>
    <line x1="950" y1="666" x2="1440" y2="666" stroke="#e2eaf6"/>
    <line x1="950" y1="692" x2="1440" y2="692" stroke="#e2eaf6"/>
    <circle cx="966" cy="445" r="4" fill="#0474c4"/>
    <text x="980" y="449" fill="#262b40" font-size="12.5" font-weight="600">id</text>
    <text x="1426" y="449" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(36) &#183; PK &#183; uuid4()</text>
    <circle cx="966" cy="471" r="4" fill="#2563EB"/>
    <text x="980" y="475" fill="#262b40" font-size="12.5">session_id</text>
    <text x="1426" y="475" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(36) &#183; NN &#183; FK &#8594; sessions.id &#183; INDEX &#183; CASCADE</text>
    <text x="980" y="501" fill="#262b40" font-size="12.5">provider</text>
    <text x="1426" y="501" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(16) &#183; NN &#183; CHECK claude|openai</text>
    <text x="980" y="527" fill="#262b40" font-size="12.5">model</text>
    <text x="1426" y="527" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(64) &#183; NN &#183; 'gpt-4o-mini' | 'demo'</text>
    <text x="980" y="553" fill="#262b40" font-size="12.5">technique</text>
    <text x="1426" y="553" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(24) &#183; NN &#183; CHECK auto|few_shot|chain_of_thought|refine</text>
    <text x="980" y="579" fill="#262b40" font-size="12.5">content</text>
    <text x="1426" y="579" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NN &#183; Lebenslauf als Markdown</text>
    <text x="980" y="605" fill="#262b40" font-size="12.5">ats_score</text>
    <text x="1426" y="605" fill="#8ba3c7" font-size="10.5" text-anchor="end">FLOAT &#183; NN &#183; =0.0 &#183; CHECK 0&#8211;100</text>
    <text x="980" y="631" fill="#262b40" font-size="12.5">matched_keywords</text>
    <text x="1426" y="631" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NN &#183; ='[]' &#183; JSON &#8595; Karte B</text>
    <text x="980" y="657" fill="#262b40" font-size="12.5">missing_keywords</text>
    <text x="1426" y="657" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NN &#183; ='[]' &#183; JSON &#8595; Karte B</text>
    <text x="980" y="683" fill="#262b40" font-size="12.5">is_selected</text>
    <text x="1426" y="683" fill="#8ba3c7" font-size="10.5" text-anchor="end">BOOLEAN &#183; NN &#183; =false &#183; reserviert (UI-Favorit)</text>
    <text x="980" y="709" fill="#262b40" font-size="12.5">created_at</text>
    <text x="1426" y="709" fill="#8ba3c7" font-size="10.5" text-anchor="end">DATETIME &#183; NN &#183; utcnow()</text>
  </g>

  <!-- ═══ messages ═══ -->
  <g filter="url(#sh)">
    <rect x="950" y="768" width="490" height="185" rx="10" fill="#ffffff" stroke="#d5deee"/>
    <path d="M950 778 Q950 768 960 768 H1430 Q1440 768 1440 778 V808 H950 Z" fill="#2c444c"/>
    <text x="968" y="794" fill="#ffffff" font-size="15" font-weight="700">messages</text>
    <text x="1424" y="793" fill="#9db3b9" font-size="11" text-anchor="end">Conversation History (1:n)</text>
    <line x1="950" y1="834" x2="1440" y2="834" stroke="#e2eaf6"/>
    <line x1="950" y1="860" x2="1440" y2="860" stroke="#e2eaf6"/>
    <line x1="950" y1="886" x2="1440" y2="886" stroke="#e2eaf6"/>
    <line x1="950" y1="912" x2="1440" y2="912" stroke="#e2eaf6"/>
    <circle cx="966" cy="821" r="4" fill="#0474c4"/>
    <text x="980" y="825" fill="#262b40" font-size="12.5" font-weight="600">id</text>
    <text x="1426" y="825" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(36) &#183; PK &#183; uuid4()</text>
    <circle cx="966" cy="847" r="4" fill="#2563EB"/>
    <text x="980" y="851" fill="#262b40" font-size="12.5">session_id</text>
    <text x="1426" y="851" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(36) &#183; NN &#183; FK &#8594; sessions.id &#183; INDEX &#183; CASCADE</text>
    <text x="980" y="877" fill="#262b40" font-size="12.5">role</text>
    <text x="1426" y="877" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT(9) &#183; NN &#183; CHECK user|assistant</text>
    <text x="980" y="903" fill="#262b40" font-size="12.5">content</text>
    <text x="1426" y="903" fill="#8ba3c7" font-size="10.5" text-anchor="end">TEXT &#183; NN &#183; Prompt bzw. Antwort</text>
    <text x="980" y="929" fill="#262b40" font-size="12.5">created_at</text>
    <text x="1426" y="929" fill="#8ba3c7" font-size="10.5" text-anchor="end">DATETIME &#183; NN &#183; Sortierkriterium</text>
  </g>

  <!-- ═══ Datenfluss (links unter sessions) ═══ -->
  <g>
    <rect x="60" y="680" width="400" height="273" rx="10" fill="#f7fafd" stroke="#d5deee"/>
    <text x="78" y="708" fill="#262b40" font-size="13" font-weight="700">Datenfluss der Endpoints</text>
    <g font-size="11.5" fill="#5379ae">
      <text x="78" y="736"><tspan font-weight="600" fill="#262b40">POST /api/session</tspan></text>
      <text x="78" y="752">&#8594; INSERT sessions</text>
      <text x="78" y="778"><tspan font-weight="600" fill="#262b40">POST /api/upload-cv</tspan></text>
      <text x="78" y="794">&#8594; DELETE + INSERT cv_documents (Text, RAG, Foto)</text>
      <text x="78" y="820"><tspan font-weight="600" fill="#262b40">POST /api/generate</tspan></text>
      <text x="78" y="836">&#8594; UPDATE sessions &#183; INSERT 1&#8211;2&#215; generations</text>
      <text x="78" y="852">&#8594; INSERT 2&#215; messages (Prompt + Antwort)</text>
      <text x="78" y="878"><tspan font-weight="600" fill="#262b40">POST /api/refine</tspan></text>
      <text x="78" y="894">&#8594; liest messages &#183; INSERT generations ('refine')</text>
      <text x="78" y="910">&#8594; INSERT 2&#215; messages</text>
      <text x="78" y="936"><tspan font-weight="600" fill="#262b40">POST /api/export</tspan> &#8594; zustandslos (kein Schreibzugriff)</text>
    </g>
  </g>

  <!-- ═══ JSON-Karten ═══ -->
  <g font-family="'SF Mono', Menlo, monospace">
    <g>
      <rect x="60" y="1000" width="436" height="238" rx="10" fill="#ffffff" stroke="#d5deee"/>
      <rect x="78" y="1018" width="150" height="22" rx="6" fill="#0474c4"/>
      <text x="86" y="1033" fill="#ffffff" font-size="10.5" font-weight="600" font-family="-apple-system, sans-serif">Karte A &#183; index_json</text>
      <text x="240" y="1033" fill="#8ba3c7" font-size="10" font-family="-apple-system, sans-serif">cv_documents &#183; RAG-Index</text>
      <g font-size="11" fill="#2c444c">
        <text x="78" y="1062">{</text>
        <text x="94" y="1080">"chunks": ["Absatz 1 &#8230;", "Absatz 2 &#8230;"],</text>
        <text x="94" y="1098">"embeddings": [[0.0123, &#8230;], &#8230;] | null</text>
        <text x="78" y="1116">}</text>
      </g>
      <g font-size="10.5" fill="#5379ae" font-family="-apple-system, sans-serif">
        <text x="78" y="1148">&#8226; Chunks: Zielgr&#246;&#223;e ~700 Zeichen, 120 Overlap</text>
        <text x="78" y="1168">&#8226; Embeddings: 1536-dim (text-embedding-3-small)</text>
        <text x="78" y="1188">&#8226; null &#8658; TF-IDF-Fallback (offline, ohne Key)</text>
        <text x="78" y="1208">&#8226; Retrieval: Top-5 Chunks per Kosinus-&#196;hnlichkeit</text>
      </g>
    </g>
    <g>
      <rect x="512" y="1000" width="436" height="238" rx="10" fill="#ffffff" stroke="#d5deee"/>
      <rect x="530" y="1018" width="196" height="22" rx="6" fill="#5379ae"/>
      <text x="538" y="1033" fill="#ffffff" font-size="10.5" font-weight="600" font-family="-apple-system, sans-serif">Karte B &#183; matched/missing_keywords</text>
      <text x="736" y="1033" fill="#8ba3c7" font-size="10" font-family="-apple-system, sans-serif">generations</text>
      <g font-size="11" fill="#2c444c">
        <text x="530" y="1062">["haccp", "men&#252;planung",</text>
        <text x="530" y="1080"> "warenbestellung", "teamf&#252;hrung"]</text>
      </g>
      <g font-size="10.5" fill="#5379ae" font-family="-apple-system, sans-serif">
        <text x="530" y="1116">&#8226; lowercase &#183; gewichtete Kernbegriffe der Stelle</text>
        <text x="530" y="1136">&#8226; Gewichtung: Gro&#223;schreibung + Fachbegriff + L&#228;nge</text>
        <text x="530" y="1156">&#8226; dedupliziert ("haccp" schl&#228;gt "haccp-standards")</text>
        <text x="530" y="1184" font-weight="600" fill="#262b40">ats_score = 100 &#183; |matched| / (|matched| + |missing|)</text>
        <text x="530" y="1208">&#8226; CHECK-Constraint: 0 &#8804; ats_score &#8804; 100</text>
      </g>
    </g>
    <g>
      <rect x="964" y="1000" width="476" height="238" rx="10" fill="#ffffff" stroke="#d5deee"/>
      <rect x="982" y="1018" width="170" height="22" rx="6" fill="#0474c4"/>
      <text x="990" y="1033" fill="#ffffff" font-size="10.5" font-weight="600" font-family="-apple-system, sans-serif">Karte C &#183; photo_data_url</text>
      <text x="1164" y="1033" fill="#8ba3c7" font-size="10" font-family="-apple-system, sans-serif">cv_documents &#183; nullable</text>
      <g font-size="11" fill="#2c444c">
        <text x="982" y="1062">"data:image/jpeg;base64,/9j/4AAQ&#8230;"</text>
      </g>
      <g font-size="10.5" fill="#5379ae" font-family="-apple-system, sans-serif">
        <text x="982" y="1096">&#8226; automatisch aus PDF/DOCX erkanntes Bewerbungsfoto</text>
        <text x="982" y="1116">&#8226; Heuristik gegen Hintergrundbilder:</text>
        <text x="998" y="1136">Seitenverh&#228;ltnis 0.5&#8211;1.4 und Detaildichte &gt; 0.05 B/px</text>
        <text x="982" y="1156">&#8226; zentriert auf Portrait 4:5 &#183; max. 500 px &#183; JPEG</text>
        <text x="982" y="1176">&#8226; NULL, wenn kein Foto gefunden wurde</text>
        <text x="982" y="1204">&#8226; Export platziert es je Design (rechts oben / zentriert)</text>
      </g>
    </g>
  </g>

  <!-- ═══ Fusszeile ═══ -->
  <text x="60" y="1288" fill="#8ba3c7" font-size="11.5">PRAGMA foreign_keys = ON &#183; ON DELETE CASCADE &#183; UUIDv4-Schl&#252;ssel &#183; CHECK-Constraints (language, provider, technique, role, ats_score) &#183; Indizes auf allen Fremdschl&#252;sseln &#183; API-Keys werden bewusst NIE gespeichert (BYOK)</text>
</svg>
