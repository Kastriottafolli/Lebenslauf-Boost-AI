    <text x="60" y="200" fill="#262b40" font-size="13" font-weight="600">index.html · SPA (DE/EN)</text>
    <text x="60" y="228" fill="#5379ae" font-size="12">css/  tokens · depth · mascot</text>
    <text x="60" y="252" fill="#5379ae" font-size="12">js/ui/  upload · generate · mascot</text>
    <text x="60" y="276" fill="#5379ae" font-size="12">js/ui/  steps · exporter · motion</text>
    <text x="60" y="312" fill="#06457f" font-size="12" font-weight="600">Boosti  geführte Tour</text>
