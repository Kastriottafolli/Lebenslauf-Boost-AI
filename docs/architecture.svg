  <text x="60" y="732" fill="#06457f" font-size="13" font-weight="700">POST /api/generate</text>
  <text x="60" y="758" fill="#5379ae" font-size="12">Validieren ’ RAG-Kontext (Top-5 Chunks) ’ Prompt (Rolle + Few-shot + CoT + Kontext) ’ Provider (compare: beide) ’ ATS-Analyse ’ Persistenz (generations + messages) ’ JSON</text>

